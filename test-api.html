<!DOCTYPE html>
<html>
<head>
    <title>Test Profile API</title>
</head>
<body>
    <h1>Test Profile API</h1>
    <button onclick="testAPI()">Test API Call</button>
    <pre id="result"></pre>

    <script>
        async function testAPI() {
            const token = sessionStorage.getItem('fluidjobs_token');
            const resultEl = document.getElementById('result');
            
            if (!token) {
                resultEl.textContent = 'No token found in sessionStorage';
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/api/profile/profile', {
                    headers: { 
                        'Authorization': `Bearer ${token}` 
                    }
                });
                
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
